<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Adăugare Zbor - Portal Aeroport</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-5">
    <div class="card shadow">
        <div class="card-header bg-success text-white">
            <h3>Adaugă Zbor</h3>
        </div>
        <div class="card-body">
            <div th:if="${error != null and !#strings.isEmpty(error)}" class="alert alert-danger" th:text="${error}"></div>

            <div class="mb-4">
                <label class="form-label fw-bold">Tip Zbor:</label>
                <select id="flightTypeSelector" class="form-select w-auto d-inline-block ms-2" onchange="toggleForm()">
                    <option value="regular">Regulat</option>
                    <option value="seasonal">Sezonier</option>
                </select>
            </div>

            <!-- Formular Zbor Regulat -->
            <form id="regularForm" th:action="@{/add-regular-flight}" th:object="${regularRequest}" method="post">
                <div th:replace="~{this :: commonFields}"></div>
                <div class="row mb-3">
                    <div class="col-md-6">
                        <label class="form-label">Zile Operare (Luni, Marți...):</label>
                        <select th:field="*{daysOfWeek}" class="form-select" multiple required>
                            <option value="MONDAY">Luni</option>
                            <option value="TUESDAY">Marți</option>
                            <option value="WEDNESDAY">Miercuri</option>
                            <option value="THURSDAY">Joi</option>
                            <option value="FRIDAY">Vineri</option>
                            <option value="SATURDAY">Sâmbătă</option>
                            <option value="SUNDAY">Duminică</option>
                        </select>
                    </div>
                </div>
                <button type="submit" class="btn btn-success">Salvează Zbor Regulat</button>
                <a th:href="@{/dashboard}" class="btn btn-secondary">Anulează</a>
            </form>

            <!-- Formular Zbor Sezonier -->
            <form id="seasonalForm" th:action="@{/add-seasonal-flight}" th:object="${seasonalRequest}" method="post" style="display: none;">
                <div th:replace="~{this :: commonFields}"></div>
                <div class="row mb-3">
                    <div class="col-md-6">
                        <label class="form-label">Zile Operare:</label>
                        <select th:field="*{daysOfWeek}" class="form-select" multiple required>
                            <option value="MONDAY">Luni</option>
                            <option value="TUESDAY">Marți</option>
                            <option value="WEDNESDAY">Miercuri</option>
                            <option value="THURSDAY">Joi</option>
                            <option value="FRIDAY">Vineri</option>
                            <option value="SATURDAY">Sâmbătă</option>
                            <option value="SUNDAY">Duminică</option>
                        </select>
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">Început Sezon (LL-ZZ):</label>
                        <input type="text" name="seasonStartStr" class="form-control" placeholder="06-01" required>
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">Sfârșit Sezon (LL-ZZ):</label>
                        <input type="text" name="seasonEndStr" class="form-control" placeholder="08-31" required>
                    </div>
                </div>
                <button type="submit" class="btn btn-warning">Salvează Zbor Sezonier</button>
                <a th:href="@{/dashboard}" class="btn btn-secondary">Anulează</a>
            </form>
        </div>
    </div>
</div>

<!-- Câmpuri Comune -->
<div th:fragment="commonFields">
    <div class="row mb-3">
        <div class="col-md-3">
            <label class="form-label">Cod Cursă</label>
            <input type="text" th:name="flightCode" class="form-control" required>
        </div>
        <div class="col-md-3">
            <label class="form-label">Model Avion</label>
            <input type="text" th:name="airplaneModel" class="form-control" required>
        </div>
        <div class="col-md-3">
            <label class="form-label">Ora Plecare</label>
            <input type="time" th:name="departureTime" class="form-control" required>
        </div>
    </div>
    <div class="row mb-3">
        <div class="col-md-6">
            <label class="form-label">Oraș Plecare</label>
            <input type="text" th:name="departureCity" class="form-control" required>
        </div>
        <div class="col-md-6">
            <label class="form-label">Destinație</label>
            <input type="text" th:name="destinationCity" class="form-control" required>
        </div>
    </div>
    
    <div class="row mb-3">
        <div class="col-md-4">
            <label class="form-label">Locuri Business</label>
            <input type="number" min="0" name="seats_BUSINESS" class="form-control" required>
            <label class="form-label mt-1">Tarif Business</label>
            <input type="number" min="0.01" step="0.01" name="prices_BUSINESS" class="form-control" required>
        </div>
        <div class="col-md-4">
            <label class="form-label">Locuri Clasa 1</label>
            <input type="number" min="0" name="seats_FIRST" class="form-control" required>
            <label class="form-label mt-1">Tarif Clasa 1</label>
            <input type="number" min="0.01" step="0.01" name="prices_FIRST" class="form-control" required>
        </div>
        <div class="col-md-4">
            <label class="form-label">Locuri Economie</label>
            <input type="number" min="0" name="seats_ECONOMY" class="form-control" required>
            <label class="form-label mt-1">Tarif Economie</label>
            <input type="number" min="0.01" step="0.01" name="prices_ECONOMY" class="form-control" required>
        </div>
    </div>
</div>

<script>
    function toggleForm() {
        const type = document.getElementById('flightTypeSelector').value;
        if (type === 'regular') {
            document.getElementById('regularForm').style.display = 'block';
            document.getElementById('seasonalForm').style.display = 'none';
        } else {
            document.getElementById('regularForm').style.display = 'none';
            document.getElementById('seasonalForm').style.display = 'block';
        }
    }
</script>
</body>
</html>
