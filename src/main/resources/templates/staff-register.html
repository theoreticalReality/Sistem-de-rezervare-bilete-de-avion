<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Inregistrare Personal - Portal Aeroport</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .register-container { max-width: 500px; margin-top: 50px; }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" th:href="@{/}">Portal Aeroport</a>
        <div class="navbar-nav ms-auto">
            <a class="nav-link" th:href="@{/staff/login}">Login personal</a>
        </div>
    </div>
</nav>
<div class="container register-container">
    <div class="card shadow">
        <div class="card-header bg-dark text-white text-center">
            <h3>Inregistrare Personal Aeroport</h3>
        </div>
        <div class="card-body">
            <div th:if="${error != null and !#strings.isEmpty(error)}" class="alert alert-danger" th:text="${error}"></div>
            
            <form th:action="@{/staff/register}" method="post">
                <div class="mb-3">
                    <label class="form-label">Nume Complet</label>
                    <input type="text" name="name" class="form-control" placeholder="ex: Ion Popescu" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Cod Personal (Acesta va fi codul de login)</label>
                    <input type="text" name="personalCode" class="form-control" placeholder="ex: AGENT-007" required>
                    <div class="form-text">Foloseste un cod pe care il poti tine minte usor.</div>
                </div>

                <button type="submit" class="btn btn-dark w-100">Creeaza cod acces</button>
            </form>
            
            <div class="mt-3 text-center">
                <p>Ai deja un cod? <a th:href="@{/staff/login}">Autentifica-te aici</a></p>
                <a th:href="@{/}">Inapoi la panoul principal</a>
            </div>
        </div>
    </div>
</div>
</body>
</html>
