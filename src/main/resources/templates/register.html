<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Inregistrare Companie - Portal Aeroport</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .register-container { max-width: 500px; margin-top: 50px; }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" th:href="@{/}">Portal Aeroport</a>
        <div class="navbar-nav ms-auto">
            <a class="nav-link" th:href="@{/login}">Login companie</a>
        </div>
    </div>
</nav>
<div class="container register-container">
    <div class="card shadow">
        <div class="card-header bg-success text-white text-center">
            <h3>Inregistrare Companie Noua</h3>
        </div>
        <div class="card-body">
            <div th:if="${error != null and !#strings.isEmpty(error)}" class="alert alert-danger" th:text="${error}"></div>
            
            <form th:action="@{/register}" th:object="${registrationRequest}" method="post">
                <div class="mb-3">
                    <label class="form-label">Nume Companie (ex: TAROM)</label>
                    <input type="text" th:field="*{name}" class="form-control" placeholder="Numele care va aparea pasagerilor" required>
                    <div class="form-text">Acest nume va fi vizibil pasagerilor in rezultatele cautarii.</div>
                </div>

                <div class="mb-3">
                    <label class="form-label">ID Companie (Cod unic)</label>
                    <input type="text" th:field="*{companyId}" class="form-control" placeholder="ex: RO-TAROM-01" required>
                    <div class="form-text">Un cod unic de identificare pentru logare alternativa.</div>
                </div>

                <div class="mb-3">
                    <label class="form-label">Adresa Email</label>
                    <input type="email" th:field="*{email}" class="form-control" placeholder="contact@companie.com" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Parola</label>
                    <input type="password" th:field="*{password}" class="form-control" required minlength="6">
                    <div class="form-text">Minim 6 caractere.</div>
                </div>

                <button type="submit" class="btn btn-success w-100">Creeaza cont</button>
            </form>
            
            <div class="mt-3 text-center">
                <p>Ai deja cont? <a th:href="@{/login}">Autentifica-te aici</a></p>
                <a th:href="@{/}">Inapoi la panoul principal</a>
            </div>
        </div>
    </div>
</div>
</body>
</html>
